<!DOCTYPE html>
<html>
<head>
    <title>For My Bestie 🖤</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            font-family: monospace;
            color: white;
            text-align: center;
            overflow: hidden;
        }

        .container {
            margin-top: 100px;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 40px;
            color: #00eaff;
            text-shadow: 0 0 10px #00eaff;
            animation: glow 2s infinite alternate;
        }

        p {
            font-size: 20px;
            opacity: 0;
            animation: slideUp 1s forwards;
        }

        p:nth-child(2) { animation-delay: 1s; }
        p:nth-child(3) { animation-delay: 2s; }
        p:nth-child(4) { animation-delay: 3s; }
        p:nth-child(5) { animation-delay: 4s; }

        button {
            margin-top: 20px;
            background: transparent;
            border: 2px solid #00eaff;
            color: #00eaff;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #00eaff;
            color: black;
            transform: scale(1.1);
        }

        #msg {
            margin-top: 20px;
            font-size: 20px;
            color: #fff;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes glow {
            from { text-shadow: 0 0 5px #00eaff; }
            to { text-shadow: 0 0 20px #00eaff; }
        }

        /* floating hearts */
        .heart {
            position: absolute;
            color: #00eaff;
            font-size: 20px;
            animation: float 6s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>For My Favorite Human 🖤</h1>

        <p>You are not just my bestie...</p>
        <p>You are my calm in chaos 🌌</p>
        <p>From games 🎮 to random talks...</p>
        <p>Everything feels better with you 💙</p>

        <button onclick="showMessage()">Open Secret ⚡</button>

        <p id="msg"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("msg").innerHTML =
            "Even in a world full of Titans... I'd still choose you 🖤";
        }

        // floating hearts generator
        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "💙";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 6000);
        }

        setInterval(createHeart, 500);
    </script>

</body>
</html>
